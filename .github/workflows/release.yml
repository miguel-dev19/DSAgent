name: 🚀 DSAgent Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      
    - name: ☕ Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 🔧 Setup Gradle
      uses: gradle/gradle-build-action@v2
      
    - name: 📝 Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
      run: echo $ENCODED_STRING | base64 -di > ${{ github.workspace }}/keystore.jks
      
    - name: 🔨 Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        echo "RELEASE_STORE_FILE=${{ github.workspace }}/keystore.jks" >> local.properties
        echo "RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD" >> local.properties
        echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> local.properties
        echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> local.properties
        ./gradlew assembleRelease
        
    - name: 📱 Upload Release APK
      uses: actions/upload-artifact@v3
      with:
        name: DSAgent-Release
        path: app/build/outputs/apk/release/app-release.apk
        
    - name: 🎉 Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/app-release.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
