name: Create Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      
    - name: Build APK
      run: chmod +x gradlew && ./gradlew assembleDebug
      
    - name: Get version
      id: version
      run: |
        echo "VERSION=v1.3.5" >> $GITHUB_OUTPUT
        echo "APK_NAME=DSAgent v1.3.5" >> $GITHUB_OUTPUT
      
    - name: Rename APK
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk "DSAgent v1.3.5.apk"
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.3.5
        name: DSAgent v1.3.5
        body: |
          ## DSAgent v1.3.5
          
          **Fecha:** $(date +'%Y-%m-%d %H:%M')
          
          ### Novedades
          - Chat con streaming en tiempo real
          - Pensamiento profundo (DeepThink)
          - Búsqueda inteligente
          - Markdown completo con bloques de código
          - Historial de conversaciones
          - Tema oscuro
          - Corrección de espacios entre tokens
          - Emojis corruptos eliminados
          
          ### Instalación
          1. Descargar **DSAgent v1.3.5.apk**
          2. Permitir instalaciones de fuentes desconocidas
          3. Instalar y disfrutar
        files: DSAgent v1.3.5.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
