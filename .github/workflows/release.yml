name: Create Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      
    - name: Build APK
      run: chmod +x gradlew && ./gradlew assembleDebug
      
    - name: Get version
      id: version
      run: |
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
        COMMIT_COUNT=$(git rev-list --count HEAD)
        echo "VERSION=${LATEST_TAG}" >> $GITHUB_OUTPUT
        echo "APK_NAME=DSAgent ${LATEST_TAG}" >> $GITHUB_OUTPUT
      
    - name: Rename APK
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk "DSAgent ${{ steps.version.outputs.VERSION }}.apk"
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: DSAgent ${{ steps.version.outputs.VERSION }}
        body: |
          ## DSAgent ${{ steps.version.outputs.VERSION }}
          
          **Fecha:** $(date +'%Y-%m-%d %H:%M')
          
          ### Novedades
          - Chat con streaming en tiempo real
          - Pensamiento profundo (DeepThink)
          - Busqueda inteligente
          - Markdown completo con bloques de codigo
          - Historial de conversaciones
          - Tema oscuro
          - Correccion de espacios entre tokens
          - Emojis corruptos eliminados
          
          ### Instalacion
          1. Descargar **DSAgent ${{ steps.version.outputs.VERSION }}.apk**
          2. Permitir instalaciones de fuentes desconocidas
          3. Instalar y disfrutar
        files: DSAgent ${{ steps.version.outputs.VERSION }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
