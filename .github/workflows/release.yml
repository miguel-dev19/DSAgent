name: Create Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      
    - name: Build APK
      run: chmod +x gradlew && ./gradlew assembleDebug
      
    - name: Get version name
      id: version
      run: |
        COMMIT_COUNT=$(git rev-list --count HEAD)
        SHORT_HASH=$(git rev-parse --short HEAD)
        echo "VERSION=v1.0.${COMMIT_COUNT}-${SHORT_HASH}" >> $GITHUB_OUTPUT
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: DSAgent ${{ steps.version.outputs.VERSION }}
        body: |
          ## DSAgent - Build Automatico
          
          **Commit:** ${{ github.sha }}
          
          ### Descargar APK
          El archivo APK esta en la seccion de Assets.
        files: app/build/outputs/apk/debug/app-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
