name: Create Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      
    - name: Build Release APK
      run: chmod +x gradlew && ./gradlew assembleRelease
      
    - name: Get version name
      id: version
      run: |
        COMMIT_COUNT=$(git rev-list --count HEAD)
        SHORT_HASH=$(git rev-parse --short HEAD)
        echo "VERSION=v1.0.${COMMIT_COUNT}-${SHORT_HASH}" >> $GITHUB_OUTPUT
        echo "DATE=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: DSAgent ${{ steps.version.outputs.VERSION }}
        body: |
          ## DSAgent - Build Automatico
          
          **Fecha:** ${{ steps.version.outputs.DATE }}
          **Commit:** ${{ github.sha }}
          
          ### Incluye:
          - Chat con streaming en tiempo real
          - Pensamiento profundo (DeepThink)
          - Busqueda inteligente
          - Historial de conversaciones
          - Tema oscuro
          - Markdown en respuestas
          - Comandos /clear y /retry
          
          ### Instalacion:
          1. Descargar APK
          2. Permitir instalaciones de fuentes desconocidas
          3. Instalar y disfrutar
        files: app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
